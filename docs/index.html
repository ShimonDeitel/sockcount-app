<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sockcount - Steps Free Movement Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#081F0F; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2rem; color:#22C55E; margin-bottom:8px; }
  p { color:rgba(255,255,255,0.75); line-height:1.6; }
  .tag { display:inline-block; margin-top:24px; padding:10px 22px; border:1px solid #22C55E; border-radius:999px; color:#22C55E; }
  footer { margin-top:48px; font-size:0.8rem; color:rgba(255,255,255,0.4); }
  a { color:#22C55E; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #22C55E55 0%, #22C55E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Sockcount - Steps Free Movement Log</h1>
    <p>Log short movement breaks throughout a sedentary workday.</p>
    <span class="tag">Available on iPhone</span>
    <footer>
      <a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a> &middot; s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>
